spec_version: 1
name: my_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy
    description: "Low complexity emergency scenarios"
    max_steps: 5
    graders:
      - easy_grader

  - id: medium
    description: "Moderate emergency scenarios with trade-offs"
    max_steps: 7
    graders:
      - medium_grader

  - id: hard
    description: "High complexity emergency scenarios with severe conditions"
    max_steps: 10
    graders:
      - hard_grader

graders:
  - id: easy_grader
    type: reward
    reward_scale: 1

  - id: medium_grader
    type: reward
    reward_scale: 1

  - id: hard_grader
    type: reward
    reward_scale: 1