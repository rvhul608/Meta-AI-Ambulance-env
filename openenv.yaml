spec_version: 1
name: my_env
type: space
runtime: fastapi
app: server.app:app
port: 8000

tasks:
  - id: easy
    description: "Low complexity emergency scenarios"
    max_steps: 5
    grader:
      type: python
      entry_point: grader:grade_easy

  - id: medium
    description: "Moderate emergency scenarios with trade-offs"
    max_steps: 7
    grader:
      type: python
      entry_point: grader:grade_medium

  - id: hard
    description: "High complexity emergency scenarios with severe conditions"
    max_steps: 10
    grader:
      type: python
      entry_point: grader:grade_hard